<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explore Layer 3</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:white;
  font-family:Arial;
}

/* TABS */
#tabs{
  display:flex;
  gap:6px;
  padding:10px;
  background:#111827;
}

.tab{
  padding:6px 10px;
  background:#1f2937;
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
}

.tab.active{
  background:#2563eb;
}

/* TOP INFO */
#topInfo{
  background:#0f172a;
  padding:8px;
  text-align:center;
  border-bottom:1px solid #333;
}

/* WORKER AREA */
#workerArea{
  text-align:center;
  padding:10px;
}

/* WORKER SLOTS */
#slots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:8px;
}

.slot{
  width:60px;
  height:40px;
  border:1px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
  justify-content:center;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
}

#log{
  text-align:center;
  margin-top:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="tabs"></div>
<div id="topInfo"></div>

<div id="workerArea">
  <div id="slots"></div>

  <div>
    <button onclick="selectWorker(1)" id="btn1">1</button>
    <button onclick="selectWorker(2)" id="btn2">2</button>
    <button onclick="selectWorker(3)" id="btn3">3</button>
    <button onclick="selectWorker(4)" id="btn4">4</button>
  </div>

  <!-- ✅ CONFIRM BUTTON ADDED -->
  <div style="margin-top:6px;">
    <button onclick="confirmWorker()" id="confirmBtn">Confirm Worker</button>
  </div>
</div>

<div id="grid"></div>
<div id="log"></div>

<script>

/* ================= STATE ================= */

const state={
  activeTab:"Explore",
  player:1,

  selectedWorker:null,
  workers:[null,null],

  workerConfirmed:false,

  grid:Array(16).fill(null).map(()=>({planet:null}))
};

/* ================= TABS ================= */

const tabs=["Explore","Grow","Convert","Research"];

function renderTabs(){
  const t=document.getElementById("tabs");
  t.innerHTML="";

  tabs.forEach(x=>{
    const d=document.createElement("div");
    d.className="tab"+(x===state.activeTab?" active":"");
    d.innerText=x;
    t.appendChild(d);
  });
}

/* ================= TOP INFO ================= */

function renderTopInfo(){
  document.getElementById("topInfo").innerHTML=`
    Player ${state.player}
  `;
}

/* ================= WORKERS ================= */

function selectWorker(val){
  if(state.workerConfirmed) return; // 🔒 prevent changes after confirm

  state.selectedWorker=val;

  // your existing behavior: auto-place immediately
  state.workers[1]=state.workers[0];
  state.workers[0]=val;

  document.getElementById("log").innerText =
    "Selected worker strength "+val;

  render();
}

function confirmWorker(){
  if(state.workers[0] === null) return;

  state.workerConfirmed = true;

  document.getElementById("log").innerText =
    "Worker confirmed with strength " + state.workers[0];

  render();
}

function renderWorkers(){
  const s=document.getElementById("slots");
  s.innerHTML="";

  state.workers.forEach(w=>{
    const d=document.createElement("div");
    d.className="slot";
    d.innerText = w ? w : "-";
    s.appendChild(d);
  });

  // disable buttons after confirm
  document.getElementById("btn1").disabled = state.workerConfirmed;
  document.getElementById("btn2").disabled = state.workerConfirmed;
  document.getElementById("btn3").disabled = state.workerConfirmed;
  document.getElementById("btn4").disabled = state.workerConfirmed;
}

/* ================= GRID ================= */

function clickTile(i){
  const cell=state.grid[i];

  if(!cell.planet){
    cell.planet={name:"Planet "+i};
    document.getElementById("log").innerText =
      "Discovered "+cell.planet.name;
  } else {
    document.getElementById("log").innerText =
      "Visited "+cell.planet.name;
  }

  render();
}

function renderGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";

  state.grid.forEach((cell,i)=>{
    const t=document.createElement("div");
    t.className="tile";

    t.innerText = cell.planet ? cell.planet.name : "⭐";

    t.onclick=()=>clickTile(i);

    g.appendChild(t);
  });
}

/* ================= RENDER ================= */

function render(){
  renderTabs();
  renderTopInfo();
  renderWorkers();
  renderGrid();
}

render();

</script>

</body>
</html>
