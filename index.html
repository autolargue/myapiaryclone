<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apiary Explore Prototype</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:white;
  font-family:Arial;
  display:flex;
}

#leftPanel{
  width:240px;
  background:#111827;
  padding:12px;
  font-size:12px;
  border-right:1px solid #333;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#topBar{
  background:#111827;
  padding:10px;
}

#tabs{
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

.tab{
  padding:6px 10px;
  background:#1f2937;
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
}
.tab.active{background:#2563eb;}

#info{
  font-size:12px;
  opacity:0.9;
  padding:4px 0;
}

/* GRID */
#content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:10px;
}

#grid{
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

#log{
  padding:8px;
  text-align:center;
  font-size:12px;
  background:#0f172a;
  border-top:1px solid #333;
}

#rightPanel{
  width:260px;
  background:#111827;
  padding:12px;
  border-left:1px solid #333;
}
</style>
</head>

<body>

<div id="leftPanel">
<b>Explore System</b><br><br>
Click a tile to discover planets.<br>
Future: workers, movement, rewards.
</div>

<div id="main">

  <div id="topBar">
    <div id="tabs"></div>

    <!-- ⭐ THIS IS YOUR MISSING CONTENT AREA -->
    <div id="info"></div>
  </div>

  <div id="content"></div>
  <div id="log"></div>

</div>

<div id="rightPanel">
  <b>Player State</b>
  <div id="playerState"></div>
</div>

<script>

/* ================= STATE ================= */

const gameState={
  activeArea:"Explore",
  currentPlayer:1,
  grid:Array(16).fill(null).map(()=>({planet:null}))
};

function currentPlayer(){
  return gameState.currentPlayer;
}

/* ================= TABS ================= */

const AREAS=["Explore","Grow","Convert","Research"];

function setTab(a){
  gameState.activeArea=a;
  render();
}

function renderTabs(){
  const t=document.getElementById("tabs");
  t.innerHTML="";

  AREAS.forEach(a=>{
    const d=document.createElement("div");
    d.className="tab"+(a===gameState.activeArea?" active":"");
    d.innerText=a;
    d.onclick=()=>setTab(a);
    t.appendChild(d);
  });
}

/* ================= INFO (THIS WAS MISSING BEFORE) ================= */

function renderInfo(){
  document.getElementById("info").innerHTML=`
    <b>Mode:</b> ${gameState.activeArea} |
    <b>Player:</b> ${gameState.currentPlayer}
  `;
}

/* ================= GRID ================= */

function explore(i){
  const cell=gameState.grid[i];

  if(!cell.planet){
    cell.planet={name:"Planet "+i};
    document.getElementById("log").innerText=
      "Discovered "+cell.planet.name;
  } else {
    document.getElementById("log").innerText=
      "Visited "+cell.planet.name;
  }

  render();
}

function renderGrid(){
  const g=document.createElement("div");
  g.id="grid";

  for(let i=0;i<16;i++){
    const t=document.createElement("div");
    t.className="tile";

    const c=gameState.grid[i];
    t.innerText=c.planet?c.planet.name:"⭐";

    t.onclick=()=>explore(i);
    g.appendChild(t);
  }

  return g;
}

/* ================= PLAYER PANEL ================= */

function renderPlayer(){
  document.getElementById("playerState").innerHTML=`
    Player ${gameState.currentPlayer}
  `;
}

/* ================= MAIN RENDER ================= */

function render(){
  renderTabs();
  renderInfo();   // ⭐ THIS RESTORES YOUR “CONTENT ABOVE GRID”

  const c=document.getElementById("content");
  c.innerHTML="";
  c.appendChild(renderGrid());

  renderPlayer();
}

/* INIT */
render();

</script>

</body>
</html>
