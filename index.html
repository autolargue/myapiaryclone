<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Explore Game Prototype</title>

<style>
body { margin:0; background:#0b1020; font-family:Arial; color:white; }

#tabs { display:flex; gap:5px; padding:10px; background:#111827; }
.tab { padding:6px 10px; background:#1f2937; cursor:pointer; border-radius:4px; font-size:12px; }
.tab.active { background:#2563eb; }

#info { padding:6px 10px; font-size:12px; }

#grid {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
  justify-content:center;
}

.tile {
  width:90px; height:90px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  cursor:pointer;
}

.blocked { background:rgba(255,0,0,0.3); }

.worker-row { display:flex; justify-content:center; gap:5px; margin:8px; }
.worker-slot {
  width:80px; height:40px;
  border:1px solid white;
  display:flex; align-items:center; justify-content:center;
}

.valid { background:rgba(0,255,0,0.25)!important; }
.path { background:rgba(255,255,0,0.3)!important; }
</style>
</head>

<body>

<div id="tabs"></div>
<div id="info"></div>
<div id="content"></div>

<script>
const QUEEN_INDEX=15;

const gameState={
  currentPlayer:1,
  playerCount:2,
  activeArea:"Explore",

  grid:Array(16).fill(null).map((_,i)=>({
    planet:null,
    revealed:false,
    hasExploreToken:i!==QUEEN_INDEX
  })),

  queenPosition:15,

  exploreWorkers:[null,null],
  workerPlacedThisTurn:false,

  movement:{
    active:false,
    path:[15],
    maxSteps:0
  }
};

/* ===== HELPERS ===== */
function getCoords(i){return {x:i%4,y:Math.floor(i/4)};}
function getIndex(x,y){return y*4+x;}
function isAdjacent(a,b){
  const A=getCoords(a),B=getCoords(b);
  return Math.abs(A.x-B.x)+Math.abs(A.y-B.y)===1;
}

/* ===== WORKERS ===== */
function addWorker(strength){
  if(gameState.workerPlacedThisTurn) return;

  const [left,right]=gameState.exploreWorkers;

  if(left===null){
    gameState.exploreWorkers=[strength,null];
  } else if(right===null){
    gameState.exploreWorkers=[strength,left];
  } else {
    bumpWorker(right);
    gameState.exploreWorkers=[strength,left];
  }

  gameState.workerPlacedThisTurn=true;
  render();
}

function bumpWorker(w){
  console.log("Bump:",w);
}

function getTotalStrength(){
  return gameState.exploreWorkers.reduce((a,b)=>a+(b||0),0);
}

/* ===== MOVEMENT ===== */
function getRemainingMoves(){
  return gameState.movement.maxSteps-(gameState.movement.path.length-1);
}

function getValidMoves(){
  if(!gameState.movement.active) return [];
  if(getRemainingMoves()<=0) return [];

  const path=gameState.movement.path;
  const last=path[path.length-1];
  const moves=[];
  const {x,y}=getCoords(last);

  const candidates=[
    {x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}
  ];

  candidates.forEach(c=>{
    if(c.x>=0 && c.x<4 && c.y>=0 && c.y<4){
      const idx=getIndex(c.x,c.y);

      // prevent backtracking
      if(path.includes(idx)) return;

      moves.push(idx);
    }
  });

  return moves;
}

function startMovement(){
  const total=getTotalStrength();
  if(total===0){ alert("Add a worker first"); return; }

  gameState.movement.active=true;
  gameState.movement.maxSteps=total;
  gameState.movement.path=[gameState.queenPosition];
  render();
}

function handleCellClick(i){
  if(!gameState.movement.active) return;

  const valid=getValidMoves();
  if(!valid.includes(i)) return;

  gameState.movement.path.push(i);
  render();
}

function resetMovement(){
  gameState.movement.path=[gameState.queenPosition];
  render();
}

function endMovement(){
  const path=gameState.movement.path;
  const final=path[path.length-1];

  gameState.queenPosition=final;
  gameState.movement.active=false;

  resolveExplore(final);
  render();
}

/* ===== EXPLORE ===== */
function drawPlanet(){
  return {name:"Planet", revealed:true};
}

function resolveExplore(i){
  const cell=gameState.grid[i];
  if(!cell.planet){
    cell.planet=drawPlanet();
  }
  cell.revealed=true;

  endTurn();
}

function endTurn(){
  gameState.currentPlayer++;
  if(gameState.currentPlayer>gameState.playerCount)gameState.currentPlayer=1;

  gameState.exploreWorkers=[null,null];
  gameState.workerPlacedThisTurn=false;
}

/* ===== RENDER ===== */

function renderExplore(){
  const c=document.createElement("div");

  /* workers */
  const row=document.createElement("div");
  row.className="worker-row";
  gameState.exploreWorkers.forEach(w=>{
    const box=document.createElement("div");
    box.className="worker-slot";
    box.innerText=w?("🐝 "+w):"Empty";
    row.appendChild(box);
  });
  c.appendChild(row);

  /* add buttons */
  const sel=document.createElement("div");
  sel.className="worker-row";

  [1,2,3,4].forEach(s=>{
    const b=document.createElement("button");
    b.innerText="Add W"+s;
    b.disabled=gameState.workerPlacedThisTurn;
    b.onclick=()=>addWorker(s);
    sel.appendChild(b);
  });

  c.appendChild(sel);

  /* text */
  const txt=document.createElement("div");
  txt.style.textAlign="center";
  txt.innerText=
    "Total strength = number of movements of Queen Ship: "+
    getTotalStrength();
  c.appendChild(txt);

  /* movement info */
  if(gameState.movement.active){
    const info=document.createElement("div");
    info.style.textAlign="center";
    info.innerText="Moves remaining: "+getRemainingMoves();
    c.appendChild(info);
  }

  /* controls */
  const ctrl=document.createElement("div");
  ctrl.className="worker-row";

  const startBtn=document.createElement("button");
  startBtn.innerText="Start";
  startBtn.disabled=gameState.movement.active;
  startBtn.onclick=startMovement;

  const endBtn=document.createElement("button");
  endBtn.innerText="End Movement";
  endBtn.onclick=endMovement;

  const resetBtn=document.createElement("button");
  resetBtn.innerText="Reset";
  resetBtn.onclick=resetMovement;

  ctrl.appendChild(startBtn);
  ctrl.appendChild(endBtn);
  ctrl.appendChild(resetBtn);

  c.appendChild(ctrl);

  /* grid */
  const grid=document.createElement("div");
  grid.id="grid";

  const valid=getValidMoves();

  for(let i=0;i<16;i++){
    const d=document.createElement("div");
    d.className="tile";

    if(i===QUEEN_INDEX){
      d.classList.add("blocked");
      d.innerText="🚀";
      grid.appendChild(d);
      continue;
    }

    d.onclick=()=>handleCellClick(i);

    if(gameState.movement.path.includes(i)){
      d.classList.add("path");
    }

    if(valid.includes(i)){
      d.classList.add("valid");
    }

    if(i===gameState.queenPosition){
      d.style.border="2px solid yellow";
    }

    const cell=gameState.grid[i];

    if(!cell.planet){
      d.innerText="⭐";
    } else {
      d.innerText="🪐";
    }

    grid.appendChild(d);
  }

  c.appendChild(grid);
  return c;
}

function render(){
  const content=document.getElementById("content");
  content.innerHTML="";
  content.appendChild(renderExplore());

  document.getElementById("info").innerText=
    "Player "+gameState.currentPlayer;
}

render();
</script>

</body>
</html>
