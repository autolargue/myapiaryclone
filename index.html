<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apiary Explore Prototype</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:white;
  font-family:Arial;
}

#tabs{
  display:flex;
  gap:6px;
  padding:10px;
  background:#111827;
}

.tab{
  padding:6px 12px;
  background:#1f2937;
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
}

.tab.active{
  background:#2563eb;
}

#info{
  text-align:center;
  padding:8px;
}

.worker-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:10px;
}

.worker-slot{
  width:80px;
  height:40px;
  border:1px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.selected{
  background:#2563eb;
}

#grid{
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
  justify-content:center;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:flex-start;
  padding:4px;
  box-sizing:border-box;
  position:relative;
}

.valid{
  background:rgba(0,255,0,0.25);
}

.path{
  background:rgba(255,255,0,0.25);
}

.slots{
  font-size:9px;
  font-family:monospace;
}

.planet-art{
  width:28px;
  height:28px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #7dd3fc, #1e3a8a);
  margin-left:5px;
}

.name{
  font-size:9px;
  margin-left:5px;
}

.sep{
  width:70%;
  height:1px;
  background:white;
  opacity:0.3;
  margin-left:5px;
}

.bonus{
  font-size:8px;
  margin-left:5px;
}

.ship{
  position:absolute;
  top:30px;
  right:5px;
  font-size:18px;
}

.divider{
  width:370px;
  height:1px;
  background:white;
  margin:5px auto;
}

#gains{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  line-height:1.6;
}
</style>
</head>
<body>

<div id="tabs"></div>
<div id="info"></div>
<div id="content"></div>

<script>
const SIZE = 4;
const AREAS = ["Explore","Grow","Convert","Research","Carve","Hibernation"];

function empty(){ return {resource:null,filled:false,predefined:false}; }
function basic(r){ return {resource:r,filled:true,predefined:true}; }

const PLANETS = [
 {name:"Aurelion",slots:[empty()],hasFourStrength:false},
 {name:"Brontes",slots:[empty()],hasFourStrength:false},
 {name:"Cyris",slots:[empty()],hasFourStrength:false},
 {name:"Demeris",slots:[basic("pollen"),empty()],hasFourStrength:true},
 {name:"Eryndor",slots:[basic("water"),empty()],hasFourStrength:false},
 {name:"Farlune",slots:[basic("fiber"),empty()],hasFourStrength:true},
 {name:"Glyra",slots:[empty(),empty()],hasFourStrength:false},
 {name:"Helion",slots:[basic("pollen"),empty(),empty()],hasFourStrength:true},
 {name:"Icaris",slots:[basic("water"),empty(),empty()],hasFourStrength:false},
 {name:"Jorath",slots:[basic("fiber"),empty(),empty()],hasFourStrength:true},
 {name:"Kryos",slots:[empty(),empty(),empty()],hasFourStrength:false},
 {name:"Lythera",slots:[empty(),empty(),empty()],hasFourStrength:true},
 {name:"Mykos",slots:[basic("pollen"),empty(),empty()],hasFourStrength:false},
 {name:"Nerath",slots:[basic("water"),empty(),empty()],hasFourStrength:true},
 {name:"Orivon",slots:[basic("fiber"),empty(),empty()],hasFourStrength:false}
];

const EXPLORE_TOKENS = [
 {type:"vp1"},
 {type:"vp2"},
 {type:"pollen"},
 {type:"water"},
 {type:"fiber"},
 {type:"wild"},
 {type:"wax"},
 {type:"honey"},
 {type:"card"},
 {type:"queen"},
 {type:"pollen"},
 {type:"water"},
 {type:"fiber"},
 {type:"wild"},
 {type:"card"}
];

function drawPlanet(){
  return structuredClone(PLANETS[Math.floor(Math.random()*PLANETS.length)]);
}

function drawToken(){
  return structuredClone(EXPLORE_TOKENS[Math.floor(Math.random()*EXPLORE_TOKENS.length)]);
}

function fmt(r){
  return r==="pollen"?"P" : r==="fiber"?"F" : r==="water"?"W" : "?";
}

function renderSlots(planet){
  return planet.slots.map(s => s.filled ? `[${fmt(s.resource)}]` : `[ ]`).join("  ");
}

const gameState = {
  currentPlayer:1,
  activeArea:"Explore",
  queenPosition:15,

  grid:Array(16).fill(null).map(()=>({
    planet:null,
    revealed:false,
    visited:false
  })),

  exploreWorkers:[null,null],
  selectedWorker:null,
  workerPlacedThisTurn:false,

  movement:{
    active:false,
    path:[],
    maxSteps:0
  },

  lastGain:{
    token:null,
    planet:[]
  }
};

function getCoords(i){
  return {x:i%SIZE,y:Math.floor(i/SIZE)};
}

function isAdjacent(a,b){
  const A=getCoords(a);
  const B=getCoords(b);
  return Math.abs(A.x-B.x)+Math.abs(A.y-B.y)===1;
}

function getTotalStrength(){
  return gameState.exploreWorkers.reduce((a,b)=>a+(b||0),0);
}

function selectWorker(strength){
  gameState.selectedWorker=strength;
  render();
}

function confirmWorker(){
  if(gameState.selectedWorker===null) return;

  const s=gameState.selectedWorker;
  const [left,right]=gameState.exploreWorkers;

  if(left===null){
    gameState.exploreWorkers=[s,null];
  }else if(right===null){
    gameState.exploreWorkers=[s,left];
  }else{
    gameState.exploreWorkers=[s,left];
  }

  gameState.selectedWorker=null;
  gameState.workerPlacedThisTurn=true;
  render();
}

function remainingMoves(){
  return gameState.movement.maxSteps - (gameState.movement.path.length-1);
}

function validMoves(){
  if(!gameState.movement.active || remainingMoves()<=0) return [];

  const path=gameState.movement.path;
  const last=path[path.length-1];

  return [last+1,last-1,last+4,last-4]
    .filter(i=>i>=0 && i<16)
    .filter(i=>isAdjacent(last,i))
    .filter(i=>!path.includes(i));
}

function startMovement(){
  const total=getTotalStrength();
  if(total===0) return;

  gameState.movement={
    active:true,
    path:[gameState.queenPosition],
    maxSteps:total
  };

  render();
}

function resetMovement(){
  gameState.movement.path=[gameState.queenPosition];
  render();
}

function clickTile(i){
  if(!validMoves().includes(i)) return;
  gameState.movement.path.push(i);
  render();
}

function animateMovement(path,done){
  let step=1;

  function next(){
    if(step>=path.length){
      done();
      return;
    }

    gameState.queenPosition=path[step];
    render();

    step++;
    setTimeout(next,200);
  }

  next();
}

function endMovement(){
  const path=[...gameState.movement.path];
  const start=path[0];

  gameState.grid[start].visited=true;
  gameState.movement.active=false;

  animateMovement(path,()=>{
    resolveExplore(path[path.length-1]);
    gameState.movement.path=[];
    render();
  });
}

function resolveExplore(index){
  const cell=gameState.grid[index];

  gameState.lastGain={
    token:null,
    planet:[]
  };

  if(!cell.planet){
    gameState.lastGain.token=drawToken();

    cell.planet=drawPlanet();

    const first=cell.planet.slots[0];
    if(first.filled && first.predefined){
      gameState.lastGain.planet.push(first.resource);
    }

    const emptySlot=cell.planet.slots.find(s=>!s.filled);
    if(emptySlot){
      const res=["pollen","fiber","water"][Math.floor(Math.random()*3)];
      emptySlot.resource=res;
      emptySlot.filled=true;
      gameState.lastGain.planet.push(res);
    }
  }else{
    cell.planet.slots.forEach(slot=>{
      if(slot.filled){
        gameState.lastGain.planet.push(slot.resource);
      }
    });
  }

  cell.revealed=true;
  cell.visited=true;

  endTurn();
}

function endTurn(){
  gameState.currentPlayer++;
  if(gameState.currentPlayer>5) gameState.currentPlayer=1;

  gameState.workerPlacedThisTurn=false;
}

function renderTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  AREAS.forEach(area=>{
    const div=document.createElement("div");
    div.className="tab"+(gameState.activeArea===area?" active":"");
    div.innerText=area;
    div.onclick=()=>{
      gameState.activeArea=area;
      render();
    };
    tabs.appendChild(div);
  });
}

function renderExplore(){
  const root=document.createElement("div");

  const workerRow=document.createElement("div");
  workerRow.className="worker-row";

  gameState.exploreWorkers.forEach(w=>{
    const slot=document.createElement("div");
    slot.className="worker-slot";
    slot.innerText=w ? "🐝 "+w : "Empty";
    workerRow.appendChild(slot);
  });

  const total=document.createElement("div");
  total.innerText="Total strength = "+getTotalStrength();
  workerRow.appendChild(total);

  root.appendChild(workerRow);

  if(!gameState.workerPlacedThisTurn){
    const selectRow=document.createElement("div");
    selectRow.className="worker-row";

    [1,2,3,4].forEach(s=>{
      const btn=document.createElement("button");
      btn.innerText="W"+s;
      if(gameState.selectedWorker===s) btn.classList.add("selected");
      btn.onclick=()=>selectWorker(s);
      selectRow.appendChild(btn);
    });

    const confirm=document.createElement("button");
    confirm.innerText="Confirm Worker";
    confirm.onclick=confirmWorker;
    selectRow.appendChild(confirm);

    root.appendChild(selectRow);
  }

  const controlRow=document.createElement("div");
  controlRow.className="worker-row";

  if(gameState.workerPlacedThisTurn && !gameState.movement.active){
    const start=document.createElement("button");
    start.innerText="Start movement";
    start.onclick=startMovement;
    controlRow.appendChild(start);
  }

  if(gameState.movement.active){
    const end=document.createElement("button");
    end.innerText="End movement";
    end.onclick=endMovement;

    const reset=document.createElement("button");
    reset.innerText="Reset";
    reset.onclick=resetMovement;

    controlRow.appendChild(end);
    controlRow.appendChild(reset);

    const moves=document.createElement("div");
    moves.innerText="Moves remaining: "+remainingMoves();
    root.appendChild(controlRow);

    const divider=document.createElement("div");
    divider.className="divider";
    root.appendChild(moves);
    root.appendChild(divider);
  }else{
    root.appendChild(controlRow);
  }

  const grid=document.createElement("div");
  grid.id="grid";

  const valid=validMoves();

  for(let i=0;i<16;i++){
    const cell=gameState.grid[i];
    const tile=document.createElement("div");
    tile.className="tile";
    tile.onclick=()=>clickTile(i);

    if(gameState.movement.path.includes(i)) tile.classList.add("path");
    if(valid.includes(i)) tile.classList.add("valid");

    if(cell.planet && cell.revealed){
      tile.innerHTML=`
        <div class="slots">${renderSlots(cell.planet)}</div>
        <div class="planet-art"></div>
        <div class="name">${cell.planet.name}</div>
        <div class="sep"></div>
        <div class="bonus">${cell.planet.hasFourStrength ? "4-strength power" : ""}</div>
      `;
    }else if(!cell.visited){
      tile.innerText="⭐";
    }

    if(i===gameState.queenPosition){
      const ship=document.createElement("div");
      ship.className="ship";
      ship.innerText="🚀";
      tile.appendChild(ship);
    }

    grid.appendChild(tile);
  }

  root.appendChild(grid);

  const gains=document.createElement("div");
  gains.id="gains";

  if(gameState.lastGain.token){
    const line1=document.createElement("div");
    line1.innerText="Explore token: reward";
    gains.appendChild(line1);
  }

  if(gameState.lastGain.planet.length){
    const line2=document.createElement("div");
    line2.innerText="Planet reward: "+gameState.lastGain.planet.join(", ");
    gains.appendChild(line2);
  }

  root.appendChild(gains);

  return root;
}

function render(){
  renderTabs();

  const content=document.getElementById("content");
  content.innerHTML="";

  if(gameState.activeArea==="Explore"){
    content.appendChild(renderExplore());
  }else{
    content.innerHTML="<div style='text-align:center;padding:30px;'>"+gameState.activeArea+" not implemented yet</div>";
  }

  document.getElementById("info").innerText="Player "+gameState.currentPlayer;
}

render();
</script>

</body>
</html>
