<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RESET TEST</title>
</head>

<body>

<h2>IF YOU SEE THIS, FILE IS CORRECT</h2>

<div id="tabs"></div>
<div id="content"></div>

<script>

const state={
 grid:Array(16).fill(null).map(()=>({planet:null}))
};

function renderTabs(){
 document.getElementById("tabs").innerHTML=
  "<button>Explore</button><button>Grow</button>";
}

function renderGrid(){
 let html="<div style='display:grid;grid-template-columns:repeat(4,80px);gap:4px'>";
 for(let i=0;i<16;i++){
  const cell=state.grid[i];
  html+=`
   <div style="width:80px;height:80px;border:1px solid black;display:flex;align-items:center;justify-content:center"
   onclick="clickTile(${i})">
   ${cell.planet?cell.planet.name:"⭐"}
   </div>
  `;
 }
 html+="</div>";
 return html;
}

function clickTile(i){
 if(!state.grid[i].planet){
  state.grid[i].planet={name:"P"+i};
 }
 render();
}

function render(){
 renderTabs();
 document.getElementById("content").innerHTML=renderGrid();
}

render();

</script>

</body>
</html>
