<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Explore Game Prototype</title>

<style>
body { margin:0; background:#0b1020; font-family:Arial; color:white; }

#info { padding:8px; text-align:center; }

#grid {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
  justify-content:center;
}

.tile {
  width:90px; height:90px;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
}

.valid { background:rgba(0,255,0,0.25); }
.path { background:rgba(255,255,0,0.3); }

.worker-row { display:flex; justify-content:center; gap:5px; margin:8px; }
.worker-slot {
  width:80px; height:40px;
  border:1px solid white;
  display:flex; align-items:center; justify-content:center;
}
</style>
</head>

<body>

<div id="info"></div>
<div id="content"></div>

<script>
const SIZE=4;

const gameState={
  currentPlayer:1,
  playerCount:2,

  queenPosition:15,

  grid:Array(16).fill(null).map(()=>({
    planet:null,
    revealed:false
  })),

  exploreWorkers:[null,null],
  workerPlacedThisTurn:false,

  movement:{
    active:false,
    path:[15],
    maxSteps:0
  }
};

/* ===== HELPERS ===== */
function getCoords(i){return {x:i%SIZE,y:Math.floor(i/SIZE)};}
function getIndex(x,y){return y*SIZE+x;}

function isAdjacent(a,b){
  const A=getCoords(a),B=getCoords(b);
  return Math.abs(A.x-B.x)+Math.abs(A.y-B.y)===1;
}

/* ===== WORKERS ===== */
function addWorker(strength){
  if(gameState.workerPlacedThisTurn) return;

  const [left,right]=gameState.exploreWorkers;

  if(left===null){
    gameState.exploreWorkers=[strength,null];
  } else if(right===null){
    gameState.exploreWorkers=[strength,left];
  } else {
    bumpWorker(right);
    gameState.exploreWorkers=[strength,left];
  }

  gameState.workerPlacedThisTurn=true;
  render();
}

function bumpWorker(w){
  console.log("Bump worker:",w);
}

function getTotalStrength(){
  return gameState.exploreWorkers.reduce((a,b)=>a+(b||0),0);
}

/* ===== MOVEMENT ===== */
function getRemainingMoves(){
  return gameState.movement.maxSteps-(gameState.movement.path.length-1);
}

function getValidMoves(){
  if(!gameState.movement.active) return [];
  if(getRemainingMoves()<=0) return [];

  const path=gameState.movement.path;
  const last=path[path.length-1];

  const {x,y}=getCoords(last);
  const candidates=[
    {x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}
  ];

  return candidates
    .filter(c=>c.x>=0 && c.x<4 && c.y>=0 && c.y<4)
    .map(c=>getIndex(c.x,c.y))
    .filter(i=>!path.includes(i)); // prevent backtracking
}

function startMovement(){
  const total=getTotalStrength();
  if(total===0){ alert("Add a worker first"); return; }

  gameState.movement.active=true;
  gameState.movement.maxSteps=total;
  gameState.movement.path=[gameState.queenPosition];
  render();
}

function handleCellClick(i){
  if(!gameState.movement.active) return;

  const valid=getValidMoves();
  if(!valid.includes(i)) return;

  gameState.movement.path.push(i);
  render();
}

function resetMovement(){
  gameState.movement.path=[gameState.queenPosition];
  render();
}

/* ===== ANIMATION ===== */
function animateMovement(path, callback){
  let step=0;

  function next(){
    if(step>=path.length){
      callback();
      return;
    }

    gameState.queenPosition=path[step];
    render();

    step++;
    setTimeout(next, 250);
  }

  next();
}

function endMovement(){
  const path=[...gameState.movement.path];

  gameState.movement.active=false;

  animateMovement(path, ()=>{
    const final=path[path.length-1];

    resolveExplore(final);

    render();
  });
}

/* ===== EXPLORE ===== */
function resolveExplore(i){
  const cell=gameState.grid[i];

  if(!cell.planet){
    cell.planet=true; // placeholder
  }

  cell.revealed=true;

  endTurn();
}

function endTurn(){
  gameState.currentPlayer++;
  if(gameState.currentPlayer>gameState.playerCount){
    gameState.currentPlayer=1;
  }

  // IMPORTANT: workers persist now
  gameState.workerPlacedThisTurn=false;
}

/* ===== RENDER ===== */

function renderExplore(){
  const c=document.createElement("div");

  /* worker slots */
  const row=document.createElement("div");
  row.className="worker-row";

  gameState.exploreWorkers.forEach(w=>{
    const box=document.createElement("div");
    box.className="worker-slot";
    box.innerText=w?("🐝 "+w):"Empty";
    row.appendChild(box);
  });

  c.appendChild(row);

  /* add worker buttons */
  const sel=document.createElement("div");
  sel.className="worker-row";

  [1,2,3,4].forEach(s=>{
    const b=document.createElement("button");
    b.innerText="Add W"+s;
    b.disabled=gameState.workerPlacedThisTurn;
    b.onclick=()=>addWorker(s);
    sel.appendChild(b);
  });

  c.appendChild(sel);

  /* text */
  const txt=document.createElement("div");
  txt.style.textAlign="center";
  txt.innerText="Total strength = "+getTotalStrength();
  c.appendChild(txt);

  if(gameState.movement.active){
    const info=document.createElement("div");
    info.style.textAlign="center";
    info.innerText="Moves remaining: "+getRemainingMoves();
    c.appendChild(info);
  }

  /* controls */
  const ctrl=document.createElement("div");
  ctrl.className="worker-row";

  const start=document.createElement("button");
  start.innerText="Start";
  start.disabled=gameState.movement.active;
  start.onclick=startMovement;

  const end=document.createElement("button");
  end.innerText="End Movement";
  end.onclick=endMovement;

  const reset=document.createElement("button");
  reset.innerText="Reset";
  reset.onclick=resetMovement;

  ctrl.appendChild(start);
  ctrl.appendChild(end);
  ctrl.appendChild(reset);

  c.appendChild(ctrl);

  /* grid */
  const grid=document.createElement("div");
  grid.id="grid";

  const valid=getValidMoves();

  for(let i=0;i<16;i++){
    const d=document.createElement("div");
    d.className="tile";

    d.onclick=()=>handleCellClick(i);

    if(gameState.movement.path.includes(i)){
      d.classList.add("path");
    }

    if(valid.includes(i)){
      d.classList.add("valid");
    }

    if(i===gameState.queenPosition){
      d.innerText="🚀";
    } else {
      const cell=gameState.grid[i];

      if(!cell.planet){
        d.innerText=""; // blank space now
      } else {
        d.innerText="🪐";
      }
    }

    grid.appendChild(d);
  }

  c.appendChild(grid);

  return c;
}

function render(){
  document.getElementById("content").innerHTML="";
  document.getElementById("content").appendChild(renderExplore());

  document.getElementById("info").innerText=
    "Player "+gameState.currentPlayer;
}

render();
</script>

</body>
</html>
