<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apiary Explore Prototype</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:white;
  font-family:Arial;
  display:flex;
}

/* LEFT PANEL */
#leftPanel{
  width:240px;
  background:#111827;
  padding:12px;
  font-size:12px;
  border-right:1px solid #333;
}

/* CENTER AREA */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TABS */
#tabs{
  display:flex;
  gap:6px;
  padding:10px;
  background:#111827;
}

.tab{
  padding:6px 10px;
  background:#1f2937;
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
}
.tab.active{background:#2563eb;}

/* CONTENT AREA */
#content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:10px;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
}

/* RIGHT PANEL */
#rightPanel{
  width:260px;
  background:#111827;
  padding:12px;
  font-size:12px;
  border-left:1px solid #333;
}

/* PLAYER BOX */
.playerBox{
  line-height:1.6;
  background:#0f172a;
  padding:10px;
  border-radius:6px;
}

button{margin:3px;}
</style>
</head>

<body>

<!-- LEFT -->
<div id="leftPanel">
<b>Explore Rules</b><br><br>
Move ship, explore planets, fill slots.<br>
Gain resources and future upgrades.<br><br>
Click tiles to interact.
</div>

<!-- CENTER -->
<div id="main">
  <div id="tabs"></div>
  <div id="content"></div>
</div>

<!-- RIGHT -->
<div id="rightPanel">
  <b>Player State</b>
  <div id="playerState"></div>
</div>

<script>

/* ===== STATE ===== */
const RES=["pollen","fiber","water"];

function createPlayer(id){
 return {
  id,
  resources:{pollen:0,fiber:0,water:0,wax:0,honey:0},
  activePool:[null,null,null,null],
  landingArea:[null,null,null,null],
  hibernationTokens:7
 };
}

const gameState={
 players:[createPlayer(1),createPlayer(2)],
 currentPlayerIndex:0,
 grid:Array(16).fill(null).map(()=>({planet:null,revealed:false}))
};

function currentPlayer(){
 return gameState.players[gameState.currentPlayerIndex];
}

/* ===== TABS ===== */
const AREAS=["Explore","Grow","Convert","Research"];

function renderTabs(){
 const t=document.getElementById("tabs");
 t.innerHTML="";
 AREAS.forEach(a=>{
  const d=document.createElement("div");
  d.className="tab active";
  d.innerText=a;
  t.appendChild(d);
 });
}

/* ===== GRID ===== */
function renderGrid(){
 const grid=document.createElement("div");
 grid.id="grid";

 for(let i=0;i<16;i++){
  const tile=document.createElement("div");
  tile.className="tile";

  const cell=gameState.grid[i];
  tile.innerText = cell.planet ? "🌍" : "⭐";

  tile.onclick=()=>{
    if(!cell.planet){
      cell.planet={name:"Planet",slots:[]};
    }
    cell.revealed=true;
    render();
  };

  grid.appendChild(tile);
 }

 return grid;
}

/* ===== PLAYER PANEL ===== */
function renderPlayer(){
 const p=currentPlayer();
 document.getElementById("playerState").innerHTML=`
 Player ${p.id}<br><br>

 Resources:<br>
 P:${p.resources.pollen}<br>
 F:${p.resources.fiber}<br>
 W:${p.resources.water}<br><br>

 Hibernation: ${p.hibernationTokens}<br><br>

 Active Pool:<br>
 ${JSON.stringify(p.activePool)}<br><br>

 Landing Area:<br>
 ${JSON.stringify(p.landingArea)}
 `;
}

/* ===== MAIN RENDER ===== */
function render(){
 renderTabs();

 const c=document.getElementById("content");
 c.innerHTML="";
 c.appendChild(renderGrid());

 renderPlayer();
}

/* INIT */
render();

</script>

</body>
</html>
