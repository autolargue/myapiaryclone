<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apiary Explore Prototype</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:white;
  font-family:Arial;
  display:flex;
}

/* LEFT */
#leftPanel{
  width:240px;
  background:#111827;
  padding:12px;
  font-size:12px;
  border-right:1px solid #333;
}

/* CENTER */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP AREA (THIS WAS MISSING) */
#topBar{
  background:#111827;
  padding:10px;
}

/* TABS */
#tabs{
  display:flex;
  gap:6px;
  margin-bottom:8px;
}

.tab{
  padding:6px 10px;
  background:#1f2937;
  border-radius:4px;
  cursor:pointer;
}
.tab.active{background:#2563eb;}

/* GRID AREA */
#content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:10px;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
}

/* TILE */
.tile{
  width:90px;
  height:90px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BOTTOM FEEDBACK */
#log{
  padding:8px;
  text-align:center;
  font-size:12px;
  background:#0f172a;
  border-top:1px solid #333;
}

/* RIGHT PANEL */
#rightPanel{
  width:260px;
  background:#111827;
  padding:12px;
  border-left:1px solid #333;
}
</style>
</head>

<body>

<div id="leftPanel">
<b>Explore System</b><br><br>
Move ship → discover planets → gain resources<br><br>
Empty slots require player choice.
</div>

<div id="main">

  <!-- ⭐ TOP BAR RESTORED -->
  <div id="topBar">
    <div id="tabs"></div>
    <div id="info"></div>
  </div>

  <div id="content"></div>
  <div id="log"></div>

</div>

<div id="rightPanel">
  <b>Player State</b>
  <div id="playerState"></div>
</div>

<script>

/* ================= STATE ================= */

function createPlayer(id){
 return {
  id,
  resources:{pollen:0,fiber:0,water:0,wax:0,honey:0},
  activePool:[null,null,null,null],
  landingArea:[null,null,null,null],
  hibernationTokens:7
 };
}

const gameState={
 players:[createPlayer(1),createPlayer(2)],
 currentPlayer:0,
 grid:Array(16).fill(null).map(()=>({planet:null,revealed:false}))
};

function currentPlayer(){
 return gameState.players[gameState.currentPlayer];
}

/* ================= TABS ================= */

const AREAS=["Explore","Grow","Convert","Research"];

function renderTabs(){
 const t=document.getElementById("tabs");
 t.innerHTML="";
 AREAS.forEach(a=>{
  const d=document.createElement("div");
  d.className="tab active";
  d.innerText=a;
  t.appendChild(d);
 });
}

/* ================= GRID ================= */

function resolveExplore(i){
 const cell=gameState.grid[i];

 if(!cell.planet){
  cell.planet={name:"Planet "+i,slots:[]};
 }

 cell.revealed=true;

 document.getElementById("log").innerText =
  "Explored sector "+i;

 render();
}

function renderGrid(){
 const grid=document.createElement("div");
 grid.id="grid";

 for(let i=0;i<16;i++){
  const tile=document.createElement("div");
  tile.className="tile";

  const cell=gameState.grid[i];
  tile.innerText = cell.planet ? "🌍" : "⭐";

  tile.onclick=()=>resolveExplore(i);

  grid.appendChild(tile);
 }

 return grid;
}

/* ================= PLAYER ================= */

function renderPlayer(){
 const p=currentPlayer();

 document.getElementById("playerState").innerHTML=`
 Player ${p.id}<br><br>

 Pollen: ${p.resources.pollen}<br>
 Fiber: ${p.resources.fiber}<br>
 Water: ${p.resources.water}<br><br>

 Hibernation: ${p.hibernationTokens}<br><br>

 Active: ${JSON.stringify(p.activePool)}<br><br>
 Landing: ${JSON.stringify(p.landingArea)}
 `;
}

/* ================= MAIN RENDER ================= */

function render(){
 renderTabs();

 document.getElementById("content").innerHTML="";
 document.getElementById("content").appendChild(renderGrid());

 renderPlayer();
}

/* INIT */
render();

</script>

</body>
</html>
