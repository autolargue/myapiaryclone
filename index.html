<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Explore Game Prototype</title>

<style>
body {
  margin: 0;
  background: #0b1020;
  font-family: Arial, sans-serif;
  color: white;
}

/* --- TABS --- */
#tabs {
  display: flex;
  gap: 5px;
  padding: 10px;
  background: #111827;
}

.tab {
  padding: 6px 10px;
  background: #1f2937;
  cursor: pointer;
  border-radius: 4px;
  font-size: 12px;
}

.tab.active {
  background: #2563eb;
}

/* --- INFO BAR --- */
#info {
  padding: 6px 10px;
  font-size: 12px;
}

/* --- GRID --- */
#grid {
  display: grid;
  grid-template-columns: repeat(4, 90px);
  grid-template-rows: repeat(4, 90px);
  gap: 4px;
  justify-content: center;
}

/* --- TILE --- */
.tile {
  width: 90px;
  height: 90px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  padding: 3px;
  box-sizing: border-box;
  cursor: pointer;
}

.face-down {
  background: rgba(0,0,0,0.5);
}

.slots {
  font-family: monospace;
  font-size: 9px;
}

.planet-art {
  width: 26px;
  height: 26px;
  margin: 0 auto;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #7dd3fc, #1e3a8a);
}

.name {
  font-size: 9px;
  font-weight: bold;
}

.bonus {
  font-size: 8px;
  opacity: 0.85;
}

.blocked {
  background: rgba(255, 0, 0, 0.2);
  cursor: not-allowed;
}

/* --- OTHER AREAS --- */
#areaContent {
  padding: 20px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- TABS -->
<div id="tabs"></div>

<!-- INFO -->
<div id="info"></div>

<!-- CONTENT -->
<div id="content"></div>

<script>
/* =========================
   GAME STATE
========================= */

const QUEEN_INDEX = 15;

const AREAS = [
  "Explore",
  "Grow",
  "Convert",
  "Research",
  "Carve",
  "Hibernation"
];

const gameState = {
  currentPlayer: 1,
  activeArea: "Explore",

  exploreWorkers: [null, null], // 2 slots
  selectedWorker: null
  
  // support up to 5 players
  players: {
    1: { pollen: 0, fiber: 0, water: 0, score: 0 },
    2: { pollen: 0, fiber: 0, water: 0, score: 0 },
    3: { pollen: 0, fiber: 0, water: 0, score: 0 },
    4: { pollen: 0, fiber: 0, water: 0, score: 0 },
    5: { pollen: 0, fiber: 0, water: 0, score: 0 }
  },

  playerCount: 2, // change this to 3–5 later

  grid: Array(16).fill(null).map((_, i) => ({
    planet: null,
    revealed: false,
    hasExploreToken: i !== QUEEN_INDEX
  }))
};

/* =========================
  WORKER SELETION & PLACEMENT
========================= */
function selectWorker(strength) {
  gameState.selectedWorker = strength;
  render();
}

function placeWorker(slotIndex) {
  if (gameState.selectedWorker === null) return;

  gameState.exploreWorkers[slotIndex] = gameState.selectedWorker;
  gameState.selectedWorker = null;

  render();
}

function getTotalStrength() {
  return gameState.exploreWorkers.reduce((sum, w) => sum + (w || 0), 0);
}
  
/* =========================
   PLANETS
========================= */

function empty() {
  return { resource: null, filled: false, predefined: false };
}

function basic(type) {
  return { resource: type, filled: true, predefined: true };
}

function fourStrengthPlaceholder() {}

const PLANETS = [
  { name: "Aurelion", slots: [empty()], hasFourStrengthBonus: false },
  { name: "Brontes", slots: [empty()], hasFourStrengthBonus: false },
  { name: "Cyris", slots: [empty()], hasFourStrengthBonus: false },
  { name: "Demeris", slots: [basic("pollen"), empty()], hasFourStrengthBonus: true },
  { name: "Eryndor", slots: [basic("water"), empty()], hasFourStrengthBonus: false },
  { name: "Farlune", slots: [basic("fiber"), empty()], hasFourStrengthBonus: true },
  { name: "Glyra", slots: [empty(), empty()], hasFourStrengthBonus: false },
  { name: "Helion", slots: [basic("pollen"), empty(), empty()], hasFourStrengthBonus: true },
  { name: "Icaris", slots: [basic("water"), empty(), empty()], hasFourStrengthBonus: false },
  { name: "Jorath", slots: [basic("fiber"), empty(), empty()], hasFourStrengthBonus: true },
  { name: "Kryos", slots: [empty(), empty(), empty()], hasFourStrengthBonus: false },
  { name: "Lythera", slots: [empty(), empty(), empty()], hasFourStrengthBonus: true },
  { name: "Mykos", slots: [basic("pollen"), empty(), empty()], hasFourStrengthBonus: false },
  { name: "Nerath", slots: [basic("water"), empty(), empty()], hasFourStrengthBonus: true },
  { name: "Orivon", slots: [basic("fiber"), empty(), empty()], hasFourStrengthBonus: false }
];

/* =========================
   HELPERS
========================= */

function formatResource(r) {
  return r === "pollen" ? "P" :
         r === "fiber" ? "F" :
         r === "water" ? "W" : "?";
}

function renderSlots(planet) {
  return planet.slots.map(s =>
    s.filled ? `[${formatResource(s.resource)}]` : "[ ]"
  ).join("  ");
}

/* =========================
   GAME LOGIC (Explore only)
========================= */

function drawPlanet() {
  return structuredClone(PLANETS[Math.floor(Math.random() * PLANETS.length)]);
}

function gainResource(player, type) {
  gameState.players[player][type]++;
}

function applyExploreTokenReward(player) {
  const types = ["pollen","fiber","water"];
  gainResource(player, types[Math.floor(Math.random()*3)]);
}

function onFirstDiscovery(player, planet) {
  const slot = planet.slots[0];
  if (slot.filled && slot.predefined) {
    gainResource(player, slot.resource);
  }

  const emptySlot = planet.slots.find(s => !s.filled);
  if (emptySlot) {
    const t = ["pollen","fiber","water"][Math.floor(Math.random()*3)];
    emptySlot.resource = t;
    emptySlot.filled = true;
    gainResource(player, t);
  }
}

function onVisitPlanet(player, planet) {
  planet.slots.forEach(s => {
    if (s.filled) gainResource(player, s.resource);
  });
}

function endTurn() {
  gameState.currentPlayer++;
  if (gameState.currentPlayer > gameState.playerCount) {
    gameState.currentPlayer = 1;
  }
}

/* =========================
   EXPLORE ACTION
========================= */

function onExplore(i) {
  if (i === QUEEN_INDEX) return;

  const cell = gameState.grid[i];
  const player = gameState.currentPlayer;

  if (!cell.planet) {
    cell.planet = drawPlanet();
    applyExploreTokenReward(player);
    onFirstDiscovery(player, cell.planet);
  }

  if (!cell.revealed) {
    cell.revealed = true;
  } else {
    onVisitPlanet(player, cell.planet);
  }

  endTurn();
  render();
}

/* =========================
   UI RENDERING
========================= */

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  AREAS.forEach(area => {
    const div = document.createElement("div");
    div.className = "tab" + (gameState.activeArea === area ? " active" : "");
    div.innerText = area;

    div.onclick = () => {
      gameState.activeArea = area;
      render();
    };

    tabs.appendChild(div);
  });
}

function renderInfo() {
  document.getElementById("info").innerText =
    "Player " + gameState.currentPlayer + "'s turn";
}

function renderExplore() {
  const container = document.createElement("div");

  /* --- WORKER SELECTION --- */
  const selection = document.createElement("div");
  selection.style.textAlign = "center";
  selection.style.marginBottom = "10px";

  [1,2,3,4].forEach(s => {
    const btn = document.createElement("button");
    btn.innerText = "Worker " + s;
    btn.style.margin = "2px";

    btn.onclick = () => selectWorker(s);

    selection.appendChild(btn);
  });

  container.appendChild(selection);

  /* --- WORKER SLOTS (2 rectangles) --- */
  const slots = document.createElement("div");
  slots.style.display = "flex";
  slots.style.justifyContent = "center";
  slots.style.gap = "10px";
  slots.style.marginBottom = "5px";

  gameState.exploreWorkers.forEach((w, i) => {
    const box = document.createElement("div");

    box.style.width = "80px";
    box.style.height = "40px";
    box.style.border = "1px solid white";
    box.style.display = "flex";
    box.style.alignItems = "center";
    box.style.justifyContent = "center";
    box.style.cursor = "pointer";

    box.onclick = () => placeWorker(i);

    box.innerText = w ? "🐝 " + w : "Empty";

    slots.appendChild(box);
  });

  container.appendChild(slots);

  /* --- TOTAL STRENGTH TEXT --- */
  const total = document.createElement("div");
  total.style.textAlign = "center";
  total.style.marginBottom = "10px";
  total.innerText =
    "Total strength = number of movements of Queen Ship: " +
    getTotalStrength();

  container.appendChild(total);

  /* --- GRID --- */
  const grid = document.createElement("div");
  grid.id = "grid";

  for (let i = 0; i < 16; i++) {
    const cell = gameState.grid[i];
    const div = document.createElement("div");

    if (i === QUEEN_INDEX) {
      div.className = "tile blocked";
      div.innerText = "🚀";
      grid.appendChild(div);
      continue;
    }

    div.className = "tile";
    div.onclick = () => onExplore(i);

    if (!cell.planet) {
      div.innerHTML = "⭐";
    } else if (!cell.revealed) {
      div.classList.add("face-down");
      div.innerHTML = "⭐";
    } else {
      const p = cell.planet;
      div.innerHTML = `
        <div class="slots">${renderSlots(p)}</div>
        <div class="planet-art"></div>
        <div class="name">${p.name}</div>
        <div class="bonus">${p.hasFourStrengthBonus ? "⚡ 4-strength" : ""}</div>
      `;
    }

    grid.appendChild(div);
  }

  container.appendChild(grid);

  return container;
}

function renderAreaContent() {
  const container = document.getElementById("content");
  container.innerHTML = "";

  if (gameState.activeArea === "Explore") {
    container.appendChild(renderExplore());
  } else {
    const div = document.createElement("div");
    div.id = "areaContent";
    div.innerText = gameState.activeArea + " (not implemented yet)";
    container.appendChild(div);
  }
}

function render() {
  renderTabs();
  renderInfo();
  renderAreaContent();
}

render();
</script>

</body>
</html>
