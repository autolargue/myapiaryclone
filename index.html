<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Explore Prototype</title>

<style>
body { margin:0; background:#0b1020; font-family:Arial; color:white; }

#info { text-align:center; padding:8px; }

.worker-row {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:10px;
}

.worker-slot {
  width:80px;
  height:40px;
  border:1px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
}

#grid {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:4px;
  justify-content:center;
}

.tile {
  width:90px; height:90px;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
}

.valid { background:rgba(0,255,0,0.25); }
.path { background:rgba(255,255,0,0.3); }

.slots { font-size:9px; font-family:monospace; }
.name { font-size:9px; }
.bonus { font-size:8px; }

.divider {
  width:370px;
  height:1px;
  background:white;
  margin:5px auto;
}
</style>
</head>

<body>

<div id="info"></div>
<div id="content"></div>

<script>
const SIZE=4;

/* ===== PLANETS ===== */
function empty(){return {resource:null,filled:false,predefined:false};}
function basic(r){return {resource:r,filled:true,predefined:true};}

function fourStrength(){}

const PLANETS=[
 {name:"Aurelion",slots:[empty()],hasFourStrength:false},
 {name:"Brontes",slots:[empty()],hasFourStrength:false},
 {name:"Cyris",slots:[empty()],hasFourStrength:false},

 {name:"Demeris",slots:[basic("pollen"),empty()],hasFourStrength:true,onFour:fourStrength},
 {name:"Eryndor",slots:[basic("water"),empty()],hasFourStrength:false},
 {name:"Farlune",slots:[basic("fiber"),empty()],hasFourStrength:true,onFour:fourStrength},
 {name:"Glyra",slots:[empty(),empty()],hasFourStrength:false},

 {name:"Helion",slots:[basic("pollen"),empty(),empty()],hasFourStrength:true,onFour:fourStrength},
 {name:"Icaris",slots:[basic("water"),empty(),empty()],hasFourStrength:false},
 {name:"Jorath",slots:[basic("fiber"),empty(),empty()],hasFourStrength:true,onFour:fourStrength},
 {name:"Kryos",slots:[empty(),empty(),empty()],hasFourStrength:false},
 {name:"Lythera",slots:[empty(),empty(),empty()],hasFourStrength:true,onFour:fourStrength},
 {name:"Mykos",slots:[basic("pollen"),empty(),empty()],hasFourStrength:false},
 {name:"Nerath",slots:[basic("water"),empty(),empty()],hasFourStrength:true,onFour:fourStrength},
 {name:"Orivon",slots:[basic("fiber"),empty(),empty()],hasFourStrength:false}
];

function drawPlanet(){
  return structuredClone(PLANETS[Math.floor(Math.random()*PLANETS.length)]);
}

function fmt(r){
  return r==="pollen"?"P":r==="fiber"?"F":r==="water"?"W":"?";
}

function renderSlots(p){
  return p.slots.map(s=>s.filled?`[${fmt(s.resource)}]`:"[ ]").join("  ");
}

/* ===== STATE ===== */
const gameState={
  currentPlayer:1,

  queenPosition:15,

  grid:Array(16).fill(null).map(()=>({
    planet:null,
    revealed:false,
    visited:false
  })),

  exploreWorkers:[null,null],
  workerPlacedThisTurn:false,

  movement:{ active:false, path:[15], maxSteps:0 }
};

/* ===== HELPERS ===== */
function getCoords(i){return {x:i%SIZE,y:Math.floor(i/SIZE)};}
function getIndex(x,y){return y*SIZE+x;}

function isAdjacent(a,b){
  const A=getCoords(a),B=getCoords(b);
  return Math.abs(A.x-B.x)+Math.abs(A.y-B.y)===1;
}

/* ===== WORKERS ===== */
function addWorker(s){
  if(gameState.workerPlacedThisTurn) return;

  const [l,r]=gameState.exploreWorkers;

  if(l===null) gameState.exploreWorkers=[s,null];
  else if(r===null) gameState.exploreWorkers=[s,l];
  else { bumpWorker(r); gameState.exploreWorkers=[s,l]; }

  gameState.workerPlacedThisTurn=true;
  render();
}

function bumpWorker(w){ console.log("bump",w); }

function getTotal(){
  return gameState.exploreWorkers.reduce((a,b)=>a+(b||0),0);
}

/* ===== MOVEMENT ===== */
function remaining(){
  return gameState.movement.maxSteps-(gameState.movement.path.length-1);
}

function validMoves(){
  if(!gameState.movement.active || remaining()<=0) return [];

  const path=gameState.movement.path;
  const last=path[path.length-1];
  const {x,y}=getCoords(last);

  return [
    {x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}
  ]
  .filter(c=>c.x>=0&&c.x<4&&c.y>=0&&c.y<4)
  .map(c=>getIndex(c.x,c.y))
  .filter(i=>!path.includes(i));
}

function startMovement(){
  const t=getTotal();
  if(t===0){alert("add worker");return;}
  gameState.movement={active:true,path:[gameState.queenPosition],maxSteps:t};
  render();
}

function clickCell(i){
  if(!gameState.movement.active) return;
  if(!validMoves().includes(i)) return;
  gameState.movement.path.push(i);
  render();
}

function animate(path,done){
  let step=1;
  function next(){
    if(step>=path.length){done();return;}
    gameState.queenPosition=path[step];
    render();
    step++;
    setTimeout(next,200);
  }
  next();
}

function endMovement(){
  const path=[...gameState.movement.path];
  const start=path[0];

  // mark origin visited → clears ⭐
  gameState.grid[start].visited=true;

  gameState.movement.active=false;

  animate(path,()=>{
    const final=path[path.length-1];
    resolveExplore(final);
    render();
  });
}

/* ===== EXPLORE ===== */
function gain(player,type){
  console.log("gain",type);
}

function resolveExplore(i){
  const cell=gameState.grid[i];

  if(!cell.planet){
    cell.planet=drawPlanet();

    // first discovery
    const s=cell.planet.slots[0];
    if(s.filled && s.predefined) gain(1,s.resource);

    const empty=cell.planet.slots.find(x=>!x.filled);
    if(empty){
      const t=["pollen","fiber","water"][Math.floor(Math.random()*3)];
      empty.resource=t; empty.filled=true;
      gain(1,t);
    }
  } else {
    cell.planet.slots.forEach(s=>{
      if(s.filled) gain(1,s.resource);
    });
  }

  cell.revealed=true;
  cell.visited=true;

  endTurn();
}

function endTurn(){
  gameState.currentPlayer++;
  gameState.workerPlacedThisTurn=false;
}

/* ===== RENDER ===== */
function render(){
  const root=document.getElementById("content");
  root.innerHTML="";

  const wrap=document.createElement("div");

  /* workers + strength */
  const row=document.createElement("div");
  row.className="worker-row";

  gameState.exploreWorkers.forEach(w=>{
    const b=document.createElement("div");
    b.className="worker-slot";
    b.innerText=w?("🐝 "+w):"Empty";
    row.appendChild(b);
  });

  const t=document.createElement("div");
  t.innerText="Total strength = "+getTotal();
  row.appendChild(t);

  wrap.appendChild(row);

  /* buttons */
  const sel=document.createElement("div");
  sel.className="worker-row";

  [1,2,3,4].forEach(s=>{
    const b=document.createElement("button");
    b.innerText="Add W"+s;
    b.disabled=gameState.workerPlacedThisTurn;
    b.onclick=()=>addWorker(s);
    sel.appendChild(b);
  });

  wrap.appendChild(sel);

  /* controls */
  const ctrl=document.createElement("div");
  ctrl.className="worker-row";

  const start=document.createElement("button");
  start.innerText="Start movement";
  start.disabled=gameState.movement.active;
  start.onclick=startMovement;

  const end=document.createElement("button");
  end.innerText="End movement";
  end.onclick=endMovement;

  ctrl.appendChild(start);
  ctrl.appendChild(end);

  wrap.appendChild(ctrl);

  /* moves */
  if(gameState.movement.active){
    const m=document.createElement("div");
    m.style.textAlign="center";
    m.innerText="Moves remaining: "+remaining();
    wrap.appendChild(m);

    const d=document.createElement("div");
    d.className="divider";
    wrap.appendChild(d);
  }

  /* grid */
  const grid=document.createElement("div");
  grid.id="grid";

  const valid=validMoves();

  for(let i=0;i<16;i++){
    const cell=gameState.grid[i];
    const d=document.createElement("div");
    d.className="tile";

    d.onclick=()=>clickCell(i);

    if(gameState.movement.path.includes(i)) d.classList.add("path");
    if(valid.includes(i)) d.classList.add("valid");

    if(i===gameState.queenPosition){
      d.innerText="🚀";
    } else if(cell.planet && cell.revealed){
      d.innerHTML=`
        <div class="slots">${renderSlots(cell.planet)}</div>
        <div class="name">${cell.planet.name}</div>
        <div class="bonus">${cell.planet.hasFourStrength?"⚡":""}</div>
      `;
    } else if(!cell.visited){
      d.innerText="⭐"; // explore token only if never visited
    } else {
      d.innerText=""; // EMPTY FIX
    }

    grid.appendChild(d);
  }

  wrap.appendChild(grid);
  root.appendChild(wrap);

  document.getElementById("info").innerText="Player "+gameState.currentPlayer;
}

render();
</script>

</body>
</html>
