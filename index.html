<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Explore Game Prototype</title>

<style>
body {
  margin: 0;
  background: #0b1020;
  font-family: Arial, sans-serif;
  color: white;
}

/* TABS */
#tabs {
  display: flex;
  gap: 5px;
  padding: 10px;
  background: #111827;
}
.tab {
  padding: 6px 10px;
  background: #1f2937;
  cursor: pointer;
  border-radius: 4px;
  font-size: 12px;
}
.tab.active { background: #2563eb; }

/* INFO */
#info {
  padding: 6px 10px;
  font-size: 12px;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(4, 90px);
  gap: 4px;
  justify-content: center;
}

/* TILE */
.tile {
  width: 90px;
  height: 90px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  padding: 3px;
  box-sizing: border-box;
  cursor: pointer;
}

.face-down { background: rgba(0,0,0,0.5); }

.slots {
  font-family: monospace;
  font-size: 9px;
}

.planet-art {
  width: 26px;
  height: 26px;
  margin: 0 auto;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #7dd3fc, #1e3a8a);
}

.name {
  font-size: 9px;
  font-weight: bold;
}

.bonus {
  font-size: 8px;
  opacity: 0.85;
}

.blocked {
  background: rgba(255,0,0,0.3);
  cursor: not-allowed;
}

/* WORKER UI */
.worker-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 8px;
}

.worker-slot {
  width: 80px;
  height: 40px;
  border: 1px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.controls {
  text-align: center;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="tabs"></div>
<div id="info"></div>
<div id="content"></div>

<script>
/* ================= STATE ================= */

const QUEEN_INDEX = 15;

const AREAS = ["Explore","Grow","Convert","Research","Carve","Hibernation"];

const gameState = {
  currentPlayer: 1,
  playerCount: 2,
  activeArea: "Explore",

  players: {
    1:{pollen:0,fiber:0,water:0},
    2:{pollen:0,fiber:0,water:0},
    3:{pollen:0,fiber:0,water:0},
    4:{pollen:0,fiber:0,water:0},
    5:{pollen:0,fiber:0,water:0}
  },

  grid: Array(16).fill(null).map((_,i)=>({
    planet:null,
    revealed:false,
    hasExploreToken: i!==QUEEN_INDEX
  })),

  queenPosition: 15,

  exploreWorkers:[null,null],
  selectedWorker:null,

  movement:{
    active:false,
    path:[15],
    maxSteps:0
  }
};

/* ================= PLANETS ================= */

function empty(){return {resource:null,filled:false,predefined:false};}
function basic(r){return {resource:r,filled:true,predefined:true};}

const PLANETS = [
  {name:"Aurelion",slots:[empty()],hasFourStrengthBonus:false},
  {name:"Brontes",slots:[empty()],hasFourStrengthBonus:false},
  {name:"Cyris",slots:[empty()],hasFourStrengthBonus:false},
  {name:"Demeris",slots:[basic("pollen"),empty()],hasFourStrengthBonus:true},
  {name:"Eryndor",slots:[basic("water"),empty()],hasFourStrengthBonus:false},
  {name:"Farlune",slots:[basic("fiber"),empty()],hasFourStrengthBonus:true},
  {name:"Glyra",slots:[empty(),empty()],hasFourStrengthBonus:false},
  {name:"Helion",slots:[basic("pollen"),empty(),empty()],hasFourStrengthBonus:true},
  {name:"Icaris",slots:[basic("water"),empty(),empty()],hasFourStrengthBonus:false},
  {name:"Jorath",slots:[basic("fiber"),empty(),empty()],hasFourStrengthBonus:true},
  {name:"Kryos",slots:[empty(),empty(),empty()],hasFourStrengthBonus:false},
  {name:"Lythera",slots:[empty(),empty(),empty()],hasFourStrengthBonus:true},
  {name:"Mykos",slots:[basic("pollen"),empty(),empty()],hasFourStrengthBonus:false},
  {name:"Nerath",slots:[basic("water"),empty(),empty()],hasFourStrengthBonus:true},
  {name:"Orivon",slots:[basic("fiber"),empty(),empty()],hasFourStrengthBonus:false}
];

/* ================= HELPERS ================= */

function drawPlanet(){
  return structuredClone(PLANETS[Math.floor(Math.random()*PLANETS.length)]);
}

function format(r){return r==="pollen"?"P":r==="fiber"?"F":r==="water"?"W":"?";}

function renderSlots(p){
  return p.slots.map(s=>s.filled?`[${format(s.resource)}]`:"[ ]").join("  ");
}

function getTotalStrength(){
  return gameState.exploreWorkers.reduce((a,b)=>a+(b||0),0);
}

function getCoords(i){return {x:i%4,y:Math.floor(i/4)};}
function isAdjacent(a,b){
  const A=getCoords(a),B=getCoords(b);
  return Math.abs(A.x-B.x)+Math.abs(A.y-B.y)===1;
}

/* ================= WORKERS ================= */

function selectWorker(s){
  gameState.selectedWorker=s;
  render();
}

function placeWorker(i){
  if(gameState.selectedWorker==null)return;
  gameState.exploreWorkers[i]=gameState.selectedWorker;
  gameState.selectedWorker=null;
  render();
}

/* ================= MOVEMENT ================= */

function startMovement(){
  const total=getTotalStrength();
  if(total===0){alert("Place workers first");return;}

  gameState.movement.active=true;
  gameState.movement.maxSteps=total;
  gameState.movement.path=[gameState.queenPosition];
  render();
}

function handleCellClick(i){
  if(!gameState.movement.active)return;

  const path=gameState.movement.path;
  const last=path[path.length-1];

  if(!isAdjacent(last,i))return;
  if(path.length-1>=gameState.movement.maxSteps)return;

  path.push(i);
  render();
}

function resetMovement(){
  gameState.movement.path=[gameState.queenPosition];
  render();
}

function confirmMovement(){
  const path=gameState.movement.path;
  const final=path[path.length-1];

  gameState.queenPosition=final;
  gameState.movement.active=false;

  resolveExplore(final);

  render();
}

/* ================= EXPLORE ================= */

function gain(player,type){
  gameState.players[player][type]++;
}

function exploreReward(p){
  const t=["pollen","fiber","water"][Math.floor(Math.random()*3)];
  gain(p,t);
}

function resolveExplore(i){
  const cell=gameState.grid[i];
  const player=gameState.currentPlayer;

  if(!cell.planet){
    cell.planet=drawPlanet();
    exploreReward(player);

    const s=cell.planet.slots.find(x=>!x.filled);
    if(s){
      const t=["pollen","fiber","water"][Math.floor(Math.random()*3)];
      s.resource=t; s.filled=true;
      gain(player,t);
    }
  }

  if(!cell.revealed){
    cell.revealed=true;
  } else {
    cell.planet.slots.forEach(s=>{
      if(s.filled) gain(player,s.resource);
    });
  }

  endTurn();
}

function endTurn(){
  gameState.currentPlayer++;
  if(gameState.currentPlayer>gameState.playerCount)gameState.currentPlayer=1;

  gameState.exploreWorkers=[null,null];
}

/* ================= RENDER ================= */

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML="";
  AREAS.forEach(a=>{
    const t=document.createElement("div");
    t.className="tab"+(a===gameState.activeArea?" active":"");
    t.innerText=a;
    t.onclick=()=>{gameState.activeArea=a;render();};
    el.appendChild(t);
  });
}

function renderInfo(){
  document.getElementById("info").innerText=
    "Player "+gameState.currentPlayer+
    " | Strength: "+getTotalStrength();
}

function renderExplore(){
  const c=document.createElement("div");

  /* workers */
  const row=document.createElement("div");
  row.className="worker-row";

  gameState.exploreWorkers.forEach((w,i)=>{
    const box=document.createElement("div");
    box.className="worker-slot";
    box.innerText=w?("🐝 "+w):"Empty";
    box.onclick=()=>placeWorker(i);
    row.appendChild(box);
  });

  c.appendChild(row);

  const txt=document.createElement("div");
  txt.style.textAlign="center";
  txt.innerText="Total strength = number of movements of Queen Ship: "+getTotalStrength();
  c.appendChild(txt);

  /* selection */
  const sel=document.createElement("div");
  sel.className="worker-row";
  [1,2,3,4].forEach(s=>{
    const b=document.createElement("button");
    b.innerText="W"+s;
    b.onclick=()=>selectWorker(s);
    sel.appendChild(b);
  });
  c.appendChild(sel);

  /* controls */
  const ctrl=document.createElement("div");
  ctrl.className="controls";

  ["Start","Confirm","Reset"].forEach(label=>{
    const b=document.createElement("button");
    b.innerText=label;
    b.onclick= label==="Start"?startMovement:
               label==="Confirm"?confirmMovement:
               resetMovement;
    ctrl.appendChild(b);
  });

  c.appendChild(ctrl);

  /* grid */
  const grid=document.createElement("div");
  grid.id="grid";

  for(let i=0;i<16;i++){
    const cell=gameState.grid[i];
    const d=document.createElement("div");

    if(i===QUEEN_INDEX){
      d.className="tile blocked";
      d.innerText="🚀";
      grid.appendChild(d);
      continue;
    }

    d.className="tile";
    d.onclick=()=>handleCellClick(i);

    if(gameState.movement.path.includes(i)){
      d.style.background="rgba(255,255,0,0.2)";
    }

    if(i===gameState.queenPosition){
      d.style.border="2px solid yellow";
    }

    if(!cell.planet){
      d.innerHTML="⭐";
    } else if(!cell.revealed){
      d.classList.add("face-down");
      d.innerHTML="⭐";
    } else {
      const p=cell.planet;
      d.innerHTML=`
        <div class="slots">${renderSlots(p)}</div>
        <div class="planet-art"></div>
        <div class="name">${p.name}</div>
        <div class="bonus">${p.hasFourStrengthBonus?"⚡":""}</div>
      `;
    }

    grid.appendChild(d);
  }

  c.appendChild(grid);
  return c;
}

function renderContent(){
  const c=document.getElementById("content");
  c.innerHTML="";
  if(gameState.activeArea==="Explore"){
    c.appendChild(renderExplore());
  } else {
    c.innerText=gameState.activeArea+" (not implemented)";
  }
}

function render(){
  renderTabs();
  renderInfo();
  renderContent();
}

render();
</script>

</body>
</html>
